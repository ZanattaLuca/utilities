<div class="period-filter">
  <mat-button-toggle-group [value]="selectedPeriod()" (change)="selectedPeriod.set($event.value)">
    @for (opt of periodOptions; track opt.value) {
      <mat-button-toggle [value]="opt.value">{{ opt.label }}</mat-button-toggle>
    }
  </mat-button-toggle-group>
</div>

<div class="spending-donut">
  <div echarts [options]="donutOption()" class="chart-container"></div>
</div>

<div class="spending-line">
  <div echarts [options]="lineOption()" class="chart-container"></div>
</div>

<div class="dashboard">
  @for (type of utilityTypes; track type) {
    <mat-card class="dashboard-card" appearance="outlined">
      <mat-card-header>
        <mat-icon mat-card-avatar class="card-icon {{ type }}">{{ icons[type] }}</mat-icon>
        <mat-card-title>{{ labels[type] }}</mat-card-title>
        <mat-card-subtitle>{{ count(type) }} entries</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="card-total">{{ total(type) | currency:'EUR':'symbol':'1.2-2' }}</div>
        @if (count(type) === 0) {
          <div class="card-empty">No entries</div>
        }
      </mat-card-content>
    </mat-card>
  }
</div>
