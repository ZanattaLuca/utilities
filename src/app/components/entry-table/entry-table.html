@if (sorted().length === 0) {
  <div class="empty-state">No entries yet. Click + to add one.</div>
} @else {
  <table mat-table [dataSource]="sorted()" class="entry-table">
    <ng-container matColumnDef="periodo">
      <th mat-header-cell *matHeaderCellDef>Period</th>
      <td mat-cell *matCellDef="let element">{{ element.periodo | period }}</td>
    </ng-container>

    <ng-container matColumnDef="importo">
      <th mat-header-cell *matHeaderCellDef>Amount</th>
      <td mat-cell *matCellDef="let element">
        {{ element.importo | currency:'EUR':'symbol':'1.2-2' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="pagato">
      <th mat-header-cell *matHeaderCellDef>Paid</th>
      <td mat-cell *matCellDef="let element">
        <mat-checkbox
          [checked]="element.pagato"
          (change)="onTogglePaid(element)"
        />
      </td>
    </ng-container>

    <ng-container matColumnDef="azioni">
      <th mat-header-cell *matHeaderCellDef class="actions-header">Actions</th>
      <td mat-cell *matCellDef="let element" class="actions-cell">
        <button mat-icon-button (click)="edit.emit({ index: element._origIndex, entry: element })" aria-label="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="remove.emit(element._origIndex)" aria-label="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
}
